services:
  creavy-ads-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: creavy-ads-mcp:latest
    container_name: creavy-ads-mcp
    restart: unless-stopped

    # Port bound ONLY to loopback on the host. Access from the
    # developer laptop goes through an SSH tunnel:
    #   ssh -fN -L 8765:localhost:8765 root@62.84.191.37
    ports:
      - "127.0.0.1:8765:8765"

    env_file:
      - .env

    # Persist the OAuth refresh token across container rebuilds.
    volumes:
      - ./data:/data:rw

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS -m 2 -H 'Accept: text/event-stream' http://127.0.0.1:8765/sse >/dev/null || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
